version: "2"

sql:
  - engine: "postgresql"
    queries: "."
    schema: "Migrations"
    gen:
      go:
        package: "queries"
        out: "queries"
        sql_package: "pgx/v5"
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        emit_pointers_for_null_types: true
        overrides:
        - db_type: "uuid"
          go_type:
            import: "github.com/Sidney-Bernardin/server"
            type: "UUID"
